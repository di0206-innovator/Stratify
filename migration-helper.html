<!DOCTYPE html>
<html>
<head>
<title>Supabase Migration SQL - Copy Me</title>
<style>
  body { font-family: monospace; padding: 20px; background: #0f0f0f; color: #c8e64a; }
  h1 { color: #fff; font-size: 18px; }
  p { color: #aaa; font-size: 13px; }
  textarea { 
    width: 100%; height: 500px; background: #1a1a1a; color: #c8e64a; 
    border: 1px solid #333; padding: 15px; font-size: 12px; 
    font-family: 'JetBrains Mono', monospace; border-radius: 8px;
  }
  button { 
    margin-top: 10px; padding: 12px 24px; background: #c8e64a; color: #000;
    font-weight: bold; border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  button:hover { background: #b5d235; }
  .step { color: #fff; margin: 8px 0; font-size: 14px; }
</style>
</head>
<body>
<h1>🗄️ Stratify — Supabase Migration SQL</h1>
<p class="step">1. Click "Copy SQL" below</p>
<p class="step">2. Go to: <a href="https://supabase.com/dashboard/project/kekoeliybtqrhgxazfhz/sql/new" target="_blank" style="color:#c8e64a">Supabase SQL Editor</a></p>
<p class="step">3. Paste (Ctrl+V) into the editor and press "Run" (or Ctrl+Enter)</p>

<textarea id="sql">-- Stratify Migration: Creates tables for Founder Memory, Startups, Timeline
-- Run this in: https://supabase.com/dashboard/project/kekoeliybtqrhgxazfhz/sql/new

CREATE TABLE IF NOT EXISTS startups (
  id              TEXT        PRIMARY KEY DEFAULT gen_random_uuid()::TEXT,
  owner_id        TEXT        NOT NULL,
  name            TEXT        NOT NULL DEFAULT 'My Startup',
  pitch           TEXT        NOT NULL DEFAULT '',
  problem         TEXT        NOT NULL DEFAULT '',
  solution        TEXT        NOT NULL DEFAULT '',
  stage           TEXT        NOT NULL DEFAULT 'idea',
  industry        TEXT        NOT NULL DEFAULT '',
  geography       TEXT        NOT NULL DEFAULT '',
  team_status     TEXT        NOT NULL DEFAULT '',
  traction        TEXT        NOT NULL DEFAULT '',
  needs           TEXT        NOT NULL DEFAULT '',
  tech_stack      TEXT        NOT NULL DEFAULT '',
  score           INTEGER     NOT NULL DEFAULT 0,
  deck_url        TEXT        DEFAULT '',
  website_url     TEXT        DEFAULT '',
  revenue         TEXT        DEFAULT '',
  funding_raised  TEXT        DEFAULT '',
  created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
  updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()
);

CREATE INDEX IF NOT EXISTS startups_owner_id_idx ON startups (owner_id);
ALTER TABLE startups ENABLE ROW LEVEL SECURITY;
DROP POLICY IF EXISTS startups_service_all ON startups;
CREATE POLICY startups_service_all ON startups USING (true) WITH CHECK (true);

CREATE TABLE IF NOT EXISTS decisions (
  id              TEXT        PRIMARY KEY DEFAULT gen_random_uuid()::TEXT,
  startup_id      TEXT        REFERENCES startups(id) ON DELETE CASCADE,
  author_id       TEXT        NOT NULL,
  title           TEXT        NOT NULL,
  context         TEXT        NOT NULL DEFAULT '',
  outcome         TEXT        NOT NULL DEFAULT '',
  status          TEXT        NOT NULL DEFAULT 'active',
  created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()
);

CREATE INDEX IF NOT EXISTS decisions_startup_id_idx ON decisions (startup_id);
CREATE INDEX IF NOT EXISTS decisions_author_id_idx  ON decisions (author_id);
CREATE INDEX IF NOT EXISTS decisions_created_at_idx ON decisions (created_at DESC);
ALTER TABLE decisions ENABLE ROW LEVEL SECURITY;
DROP POLICY IF EXISTS decisions_service_all ON decisions;
CREATE POLICY decisions_service_all ON decisions USING (true) WITH CHECK (true);

CREATE TABLE IF NOT EXISTS timeline_events (
  id          TEXT        PRIMARY KEY DEFAULT gen_random_uuid()::TEXT,
  startup_id  TEXT        REFERENCES startups(id) ON DELETE CASCADE,
  actor_id    TEXT,
  event_type  TEXT        NOT NULL,
  title       TEXT        NOT NULL,
  description TEXT        NOT NULL DEFAULT '',
  metadata    JSONB       NOT NULL DEFAULT '{}',
  created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW()
);

CREATE INDEX IF NOT EXISTS timeline_events_startup_id_idx ON timeline_events (startup_id);
CREATE INDEX IF NOT EXISTS timeline_events_created_at_idx ON timeline_events (created_at DESC);
ALTER TABLE timeline_events ENABLE ROW LEVEL SECURITY;
DROP POLICY IF EXISTS timeline_events_service_all ON timeline_events;
CREATE POLICY timeline_events_service_all ON timeline_events USING (true) WITH CHECK (true);
</textarea>

<br>
<button onclick="copySql()">📋 Copy SQL to Clipboard</button>
<span id="copied" style="color:#c8e64a; margin-left:10px; display:none">✅ Copied! Now paste in Supabase SQL Editor and Run</span>

<script>
function copySql() {
  const ta = document.getElementById('sql');
  ta.select();
  document.execCommand('copy');
  document.getElementById('copied').style.display = 'inline';
}
</script>
</body>
</html>
