# ════════════════════════════════════════════════════════════════════
#  Stratify — Nginx Configuration
#  Handles: load balancing, rate limiting, gzip, security headers,
#           static file serving, WebSocket support.
# ════════════════════════════════════════════════════════════════════

# ── Worker tuning ──────────────────────────────────────────────────
worker_processes      auto;          # 1 per CPU core
worker_rlimit_nofile  100000;        # maximum open file descriptors

events {
    worker_connections  10000;       # 10k concurrent connections per worker
    use                 epoll;       # Linux: most efficient I/O model
    multi_accept        on;          # accept multiple connections per event
}

http {
    # ── Basic settings ─────────────────────────────────────────────
    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    charset             utf-8;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    server_tokens       off;        # don't leak Nginx version

    # ── Buffer sizes (tune for high concurrency) ───────────────────
    client_body_buffer_size     16k;
    client_header_buffer_size    4k;
    client_max_body_size        10m;
    large_client_header_buffers 4 8k;

    # ── Gzip ───────────────────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Logging ─────────────────────────────────────────────────────
    log_format main
        '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for" '
        'rt=$request_time up_rt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Rate limiting zones ─────────────────────────────────────────
    # Zone "api": 10 MB shared memory → handles ~160k unique IPs
    # Limit: 60 req/min per IP for API calls (burst 20 without delay)
    limit_req_zone  $binary_remote_addr zone=api:10m   rate=60r/m;

    # Zone "auth": Stricter limit for auth endpoints
    limit_req_zone  $binary_remote_addr zone=auth:10m  rate=10r/m;

    # Zone "analyze": Even stricter for AI analysis (expensive operations)
    limit_req_zone  $binary_remote_addr zone=analyze:10m rate=5r/m;

    limit_req_status 429;
    limit_conn_status 429;

    # ── Connection limiting ─────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstream: Node.js app workers ──────────────────────────────
    # In Docker Compose, "app" resolves to all container replicas
    # Docker's internal DNS does round-robin across replicas automatically
    upstream stratify_backend {
        server app:3000;
        # In production with multiple containers, add more:
        # server app_2:3000;
        # server app_3:3000;
        # server app_4:3000;

        keepalive         64;       # keep 64 upstream connections alive
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }

    # ── Security headers map ────────────────────────────────────────
    map $sent_http_content_type $cache_control {
        ~*text/html                 "no-cache, no-store, must-revalidate";
        ~*application/json          "no-cache";
        ~*image/                    "public, max-age=31536000, immutable";
        ~*(css|javascript)          "public, max-age=31536000, immutable";
        default                     "no-cache";
    }

    # ── Main server block ──────────────────────────────────────────
    server {
        listen       80;
        listen       [::]:80;
        server_name  _;

        # ── Security headers ───────────────────────────────────────
        add_header X-Frame-Options          "SAMEORIGIN"   always;
        add_header X-Content-Type-Options   "nosniff"      always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;

        # ── Connection limits ──────────────────────────────────────
        limit_conn conn 50;         # max 50 concurrent connections per IP

        # ── Health check (no rate limit — used by LB probes) ──────
        location = /api/health {
            proxy_pass http://stratify_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ── Auth endpoints (strict rate limit) ────────────────────
        location ~ ^/api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://stratify_backend;
        }

        # ── Analyze endpoint (very strict — AI is expensive) ──────
        location = /api/analyze {
            limit_req zone=analyze burst=2 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_read_timeout 120s;   # AI calls can take a while
            proxy_pass http://stratify_backend;
        }

        # ── All other API routes ───────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            include /etc/nginx/conf.d/proxy_params.conf;
            proxy_pass http://stratify_backend;
        }

        # ── Static assets (Vite build output) ─────────────────────
        # Served directly by Nginx — never hits Node.js
        location ~* \.(js|css|woff2|woff|ttf|ico|svg|png|jpg|webp|gif|avif)$ {
            root  /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ── React SPA routing ─────────────────────────────────────
        # All other paths serve index.html (client-side routing)
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html =404;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── Custom error pages ─────────────────────────────────────
        error_page 429 /api/health;
        error_page 502 503 504 @upstream_error;

        location @upstream_error {
            default_type application/json;
            return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"Service is temporarily unavailable. Please retry."}}';
        }
    }
}
